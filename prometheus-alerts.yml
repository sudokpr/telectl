groups:
  - name: telegram-control
    rules:
      - alert: TelegramControlBackupMetricsMissing
        expr: absent(telegram_control_backup_last_run_timestamp_seconds)
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Telegram Control backup metrics are missing
          description: Prometheus has not seen backup run metrics. Check the backup metrics Pushgateway configuration.

      - alert: TelegramControlBackupStalled
        expr: time() - telegram_control_backup_last_run_timestamp_seconds > 30 * 60 * 60
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Telegram Control backup has not run recently
          description: The daily backup metrics have not been updated for more than 30 hours.

      - alert: TelegramControlBackupFailed
        expr: telegram_control_backup_last_failure_timestamp_seconds > telegram_control_backup_last_success_timestamp_seconds
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Latest Telegram Control backup failed
          description: The most recent backup run failed after the last successful run.
